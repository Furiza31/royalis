add_newline = false

format = """
$cmd_duration $directory$git_branch
  $character"""

[fill]
symbol = '-'
style = 'fg:#8839ef'

[character]                            
success_symbol = "[о©ұ пҒӢ](bold fg:#8839ef)"
error_symbol = "[пҖҚ пҒӢ](bold fg:#d20f39)"

[package]
disabled = true

[git_branch]
style = "bg:#8839ef"
symbol = "у°ҳ¬"
truncation_length = 12
truncation_symbol = ""
format = " у°ңҘ [оӮ¶](bold fg:#8839ef)[$symbol $branch(:$remote_branch)](bold fg:#eff1f5 bg:#8839ef)[оӮҙ ](bold fg:#8839ef)"

[git_commit]
commit_hash_length = 4
tag_symbol = "п’¶ "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[рҹҚ’ PICKING](bold fg:#d20f39)"

[git_status]
conflicted = " рҹҸі "
ahead = " рҹҸҺрҹ’Ё "
behind = " рҹҳ° "
diverged = " рҹҳө "
untracked = " рҹӨ· вҖҚ"
stashed = " рҹ“Ұ "
modified = " рҹ“қ "
staged = '[++\($count\)](fg:#40a02b)'
renamed = " вңҚпёҸ "
deleted = " рҹ—‘ "

[hostname]
ssh_only = false
format =  "[вҖў$hostname](bg:#8839ef bold fg:#eff1f5)[оӮҙ](bold fg:#8839ef)"
trim_at = ".companyname.com"
disabled = false

[line_break]
disabled = false

[memory_usage]
disabled = true
threshold = -1
symbol = " "
style = "bold dimmed fg:#8839ef"

[time]
disabled = true
format = 'рҹ•ҷ[\[ $time \]]($style) '
time_format = "%T"

[username]
style_user = "bold bg:#8839ef fg:#eff1f5"
style_root = "bold bg:#8839ef fg:#d20f39"
format = "[оӮ¶](bold fg:#8839ef)[$user]($style)"
disabled = false
show_always = true

[directory]
home_symbol = "п‘ӯ "
read_only = " п‘– "
style = "bg:#8839ef fg:#eff1f5"
truncation_length = 2
truncation_symbol = ".../"
format = '[оӮ¶](bold fg:#8839ef)[у°үӢ вҶ’ $path]($style)[оӮҙ](bold fg:#8839ef)'

[directory.substitutions]
"Desktop" = " п’© "
"Documents" = " п’Ҙ "
"Downloads" = " пҗү "
"Music" = " у°ҺҲ "
"Pictures" = " пҗҸ "
"Videos" = " п”¬ "
"GitHub" = " у°ҠӨ "

[cmd_duration]
min_time = 0
format = '[оӮ¶](bold fg:#8839ef)[у°Әў $duration](bold bg:#8839ef fg:#eff1f5)[оӮҙ](bold fg:#8839ef)'